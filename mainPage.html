<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Начало</title>
</head>
<body>
   <h1>Това е вашето главно меню!</h1>

   <script src="mainScript.js"></script>
